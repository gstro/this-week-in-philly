[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# Ruff's own defaults (E4/E7/E9/F) plus ANN: require type annotations on
# every function argument and return value.
extend-select = ["ANN"]

[tool.mypy]
python_version = "3.12"
files = ["scripts"]
check_untyped_defs = true

# spotipy ships no type stubs and no types-spotipy package exists (checked
# PyPI). google-auth-oauthlib-stubs exists on PyPI but is broken (installs
# an empty placeholder, no actual stub files -- checked). google-api-python-
# client's are covered by the google-api-python-client-stubs dev dependency
# instead of being suppressed here -- see scripts/common.py's TYPE_CHECKING
# import for the real Calendar v3 types.
[[tool.mypy.overrides]]
module = ["spotipy", "spotipy.oauth2", "google_auth_oauthlib.flow"]
ignore_missing_imports = true
