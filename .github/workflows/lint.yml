name: Lint & Test
on:
  push:
    paths:
      - 'scripts/**.py'
      - 'tests/**.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'scripts/**.py'
      - 'tests/**.py'
      - 'pyproject.toml'
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff
      - run: ruff check scripts/
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      # requirements-collection.txt (playwright) is needed too -- fetch_page_text.py
      # imports it, and mypy needs the package importable to type-check that
      # import, even though it never executes/launches a browser.
      - run: pip install -r scripts/requirements-dev.txt -r scripts/requirements-collection.txt
      - run: mypy
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          pip install -r scripts/requirements-dev.txt -r scripts/requirements-collection.txt
          playwright install --with-deps chromium
      # Default addopts (pyproject.toml) excludes -m network -- this is the
      # fast, offline suite only. Network/integration tests against the real
      # sources are run manually (`pytest -m network`), not in CI.
      - run: pytest -v
