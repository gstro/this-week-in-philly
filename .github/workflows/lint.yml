name: Lint
on:
  push:
    paths:
      - 'scripts/**.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'scripts/**.py'
      - 'pyproject.toml'
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff
      - run: ruff check scripts/
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r scripts/requirements-dev.txt
      - run: mypy
